<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Delay VST Plugin Replica</title>

    <!-- Instruct Trunk to compile our Rust project -->
    <link data-trunk rel="rust" data-wasm-opt="2" />
    <base data-trunk-public-url />

    <style>
        html, body {
            overflow: hidden;
            margin: 0 !important;
            padding: 0 !important;
            height: 100%;
            width: 100%;
            background: #12151b;
        }

        /* Stretch the canvas to fill the entire screen */
        canvas {
            margin-right: auto;
            margin-left: auto;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <!-- The WASM code will target this canvas ID -->
    <canvas id="the_canvas_id"></canvas>
</body>
</html>
